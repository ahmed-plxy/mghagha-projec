name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate & Export Keystore
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore with keytool
        run: |
          keytool -genkey -v \
            -keystore mghagha-release.jks \
            -alias mghagha \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Mghagha@Store2026 \
            -keypass Mghagha@Store2026 \
            -dname "CN=Mghagha Store, OU=Mobile, O=Mghagha, L=Maghagha, S=Minya, C=EG"

          echo "Keystore generated successfully."
          keytool -list -v -keystore mghagha-release.jks -storepass Mghagha@Store2026

      - name: Base64-encode keystore
        run: |
          base64 -w 0 mghagha-release.jks > keystore-base64.txt
          echo ""
          echo "=== COPY EVERYTHING BELOW THIS LINE INTO GITHUB SECRET KEYSTORE_BASE64 ==="
          cat keystore-base64.txt
          echo ""
          echo "=== END OF KEYSTORE_BASE64 VALUE ==="

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            mghagha-release.jks
            keystore-base64.txt
          retention-days: 1

      - name: Print GitHub Secrets setup instructions
        run: |
          echo ""
          echo "========================================"
          echo "  GITHUB SECRETS TO CREATE"
          echo "========================================"
          echo "Go to: GitHub repo → Settings → Secrets → Actions → New repository secret"
          echo ""
          echo "  Secret 1:  KEYSTORE_BASE64"
          echo "             Value: (contents of keystore-base64.txt from the artifact above)"
          echo ""
          echo "  Secret 2:  KEYSTORE_PASSWORD"
          echo "             Value: Mghagha@Store2026"
          echo ""
          echo "  Secret 3:  KEY_ALIAS"
          echo "             Value: mghagha"
          echo ""
          echo "  Secret 4:  KEY_PASSWORD"
          echo "             Value: Mghagha@Store2026"
          echo ""
          echo "After adding all 4 secrets, push any commit to trigger the main build workflow."
          echo "========================================"
