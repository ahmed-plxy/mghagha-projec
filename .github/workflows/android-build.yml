name: Build Signed Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends imagemagick
          convert --version | head -1

      # ── 3. Version ────────────────────────────────────────────────────────────
      - name: Set version numbers
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      # ── 4. Install Node dependencies ─────────────────────────────────────────
      # @capacitor/assets removed — it crashes npm due to peer-dep conflicts.
      # Icons are generated with ImageMagick instead (step 7).
      - name: Install dependencies
        working-directory: mobile-app
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # ── 5. Capacitor — add & sync Android ────────────────────────────────────
      - name: Add Android platform
        working-directory: mobile-app
        run: |
          if [ -d android ]; then
            echo "android/ already exists, skipping cap add."
          else
            ./node_modules/.bin/cap add android
          fi

      - name: Sync Capacitor to Android
        working-directory: mobile-app
        run: ./node_modules/.bin/cap sync android

      # ── 6. Signing secrets ────────────────────────────────────────────────────
      - name: Check signing secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
            echo "⚠️  No KEYSTORE_BASE64 secret — will build a debug APK."
          else
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
            echo "✅ Keystore secret present."
          fi

      - name: Decode keystore
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mghagha-release.jks

      # ── 7. Generate all Android icon + splash sizes with ImageMagick ──────────
      # No @capacitor/assets needed — ImageMagick writes directly to the res dirs.
      - name: Generate launcher icons and splash screens
        working-directory: mobile-app/android/app/src/main/res
        run: |
          # Icon sizes per DPI bucket
          declare -A SIZES=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )

          for DIR in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DIR]}
            mkdir -p "$DIR"

            # Square icon
            convert -size "${SIZE}x${SIZE}" xc:'#1e7a4c' \
              -fill '#ffffff' -gravity center \
              -font /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf \
              -pointsize $(( SIZE * 4 / 10 )) \
              -annotate 0 'M' \
              "$DIR/ic_launcher.png"

            # Round icon (same design, Capacitor looks for this too)
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"

            echo "  $DIR — ${SIZE}x${SIZE}"
          done

          # Splash screens (drawable folders)
          declare -A SPLASH=(
            [drawable]=480
            [drawable-land-hdpi]=800
            [drawable-port-hdpi]=480
            [drawable-land-xhdpi]=1280
            [drawable-port-xhdpi]=720
          )

          for DIR in "${!SPLASH[@]}"; do
            SIZE=${SPLASH[$DIR]}
            mkdir -p "$DIR"
            convert -size "${SIZE}x${SIZE}" xc:'#1e7a4c' \
              -fill '#ffffff' -gravity center \
              -font /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf \
              -pointsize $(( SIZE / 6 )) \
              -annotate 0 'Mghagha Store' \
              "$DIR/splash.png"
            echo "  $DIR — ${SIZE}x${SIZE}"
          done

          echo "All icons and splash screens generated."

      # ── 8. Patch build.gradle (version + signing) ─────────────────────────────
      - name: Patch build.gradle
        working-directory: mobile-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: node inject-signing.js

      # ── 9. Gradle build ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build signed RELEASE APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build DEBUG APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 10. Zipalign + verify ─────────────────────────────────────────────────
      - name: Zipalign and verify signed APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign 2>/dev/null | sort | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner 2>/dev/null | sort | tail -1)
          UNSIGNED=$(find app/build/outputs/apk/release -name "*unsigned*.apk" 2>/dev/null | head -1)
          OUT_DIR="app/build/outputs/apk/release"
          OUT_NAME="mghagha-v${{ env.VERSION_NAME }}-signed.apk"

          echo "zipalign : $ZIPALIGN"
          echo "apksigner: $APKSIGNER"
          echo "unsigned : $UNSIGNED"

          if [ -n "$UNSIGNED" ] && [ -n "$ZIPALIGN" ] && [ -n "$APKSIGNER" ]; then
            "$ZIPALIGN" -v 4 "$UNSIGNED" "$OUT_DIR/aligned.apk"
            "$APKSIGNER" sign \
              --ks ../mghagha-release.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out "$OUT_DIR/$OUT_NAME" \
              "$OUT_DIR/aligned.apk"
            "$APKSIGNER" verify "$OUT_DIR/$OUT_NAME"
            echo "✅ Verified: $OUT_NAME"
          else
            SRC=$(find "$OUT_DIR" -name "app-release.apk" 2>/dev/null | head -1)
            [ -n "$SRC" ] && cp "$SRC" "$OUT_DIR/$OUT_NAME"
            echo "Gradle-signed APK renamed to $OUT_NAME"
          fi

      # ── 11. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.SIGNING_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-SIGNED
          path: mobile-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload debug APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 12. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## متجر مغاغة — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| versionName | 1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ${{ env.SIGNING_AVAILABLE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://mghagha-projectzip--josenberlo.replit.app |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            echo "✅ **Signed release APK** — safe to install, no Play Protect warnings." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug APK** — add the 4 signing secrets and push again." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
