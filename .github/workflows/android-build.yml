name: Build Signed Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Version ───────────────────────────────────────────────────────────────
      - name: Set version from run number
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "Build #${{ github.run_number }} — versionCode=${{ github.run_number }}, versionName=1.0.${{ github.run_number }}"

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install mobile-app dependencies (including devDependencies)
        working-directory: mobile-app
        run: npm install --include=dev

      # ── Icon & Splash ─────────────────────────────────────────────────────────
      - name: Generate icon and splash assets with ImageMagick
        working-directory: mobile-app
        run: |
          mkdir -p assets

          # Find any bold/regular font available on this runner
          FONT=$(fc-match --format="%{file}" "DejaVu Sans:bold" 2>/dev/null || true)
          if [ -z "$FONT" ] || [ ! -f "$FONT" ]; then
            FONT=$(find /usr/share/fonts -name "*.ttf" | head -1)
          fi
          echo "Using font: $FONT"

          convert -size 1024x1024 xc:'#1e7a4c' \
            -fill '#ffffff' \
            -font "$FONT" \
            -pointsize 420 -gravity center -annotate 0 'M' \
            assets/icon-only.png

          convert -size 2732x2732 xc:'#1e7a4c' \
            -fill '#ffffff' \
            -font "$FONT" \
            -pointsize 200 -gravity center -annotate 0 'Mghagha Store' \
            assets/splash.png

          echo "Assets generated:" && ls -lh assets/

      - name: Generate Capacitor icon and splash resources
        working-directory: mobile-app
        run: ./node_modules/.bin/capacitor-assets generate --iconBackgroundColor '#1e7a4c' --splashBackgroundColor '#1e7a4c'

      # ── Android Platform ──────────────────────────────────────────────────────
      - name: Add Android platform
        working-directory: mobile-app
        run: |
          if [ -d "android" ]; then
            echo "Android platform already exists — skipping cap add."
          else
            ./node_modules/.bin/cap add android
          fi

      - name: Sync Capacitor with Android
        working-directory: mobile-app
        run: ./node_modules/.bin/cap sync android

      # ── Signing secrets check ─────────────────────────────────────────────────
      - name: Check if signing secrets are configured
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
            echo "⚠️  KEYSTORE_BASE64 secret not set — building debug APK as fallback."
          else
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
            echo "✅ Signing secrets detected."
          fi

      - name: Decode keystore from secret
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mghagha-release.jks

      # ── Inject version + signing into build.gradle ────────────────────────────
      - name: Patch build.gradle (version + signing)
        working-directory: mobile-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: node inject-signing.js

      # ── Gradle build ──────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build signed RELEASE APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build DEBUG APK (fallback — secrets not configured yet)
        if: env.SIGNING_AVAILABLE == 'false'
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Zipalign + apksigner ──────────────────────────────────────────────────
      - name: Zipalign and verify signed APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign 2>/dev/null | sort | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner 2>/dev/null | sort | tail -1)
          UNSIGNED=$(find app/build/outputs/apk/release -name "*unsigned*.apk" 2>/dev/null | head -1)
          SIGNED_NAME="mghagha-v${{ env.VERSION_NAME }}-signed.apk"

          echo "zipalign  : $ZIPALIGN"
          echo "apksigner : $APKSIGNER"
          echo "unsigned  : $UNSIGNED"

          if [ -n "$UNSIGNED" ] && [ -n "$ZIPALIGN" ] && [ -n "$APKSIGNER" ]; then
            ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
            SIGNED="app/build/outputs/apk/release/$SIGNED_NAME"
            "$ZIPALIGN" -v 4 "$UNSIGNED" "$ALIGNED"
            "$APKSIGNER" sign \
              --ks ../mghagha-release.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out "$SIGNED" "$ALIGNED"
            "$APKSIGNER" verify "$SIGNED"
            echo "✅ APK signed and verified: $SIGNED"
          else
            # Gradle signing config handled it — just give it a friendly name
            SRC=$(find app/build/outputs/apk/release -name "app-release.apk" 2>/dev/null | head -1)
            [ -n "$SRC" ] && cp "$SRC" "app/build/outputs/apk/release/$SIGNED_NAME"
            echo "Gradle-signed APK renamed to $SIGNED_NAME"
          fi

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.SIGNING_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-SIGNED
          path: mobile-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload debug APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## متجر مغاغة — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| versionName | 1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ${{ env.SIGNING_AVAILABLE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://mghagha-projectzip--josenberlo.replit.app |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            echo "✅ **Signed release APK** — no Play Protect warnings." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug APK** — add signing secrets and push again for a release build." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download from **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
