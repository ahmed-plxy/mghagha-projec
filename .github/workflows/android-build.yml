name: Build Signed Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. System tools (ImageMagick is NOT pre-installed on ubuntu-latest) ──
      - name: Install ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick
          convert --version

      # ── 4. Version numbers ────────────────────────────────────────────────────
      - name: Set version from run number
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "versionCode=${{ github.run_number }}, versionName=1.0.${{ github.run_number }}"

      # ── 5. Node dependencies ──────────────────────────────────────────────────
      - name: Install mobile-app dependencies
        working-directory: mobile-app
        run: npm install --include=dev

      # ── 6. Icon & Splash assets ───────────────────────────────────────────────
      - name: Generate icon and splash PNGs
        working-directory: mobile-app
        run: |
          mkdir -p assets

          # Dynamically find a TTF font — DejaVu is installed after apt-get above
          FONT=$(fc-match --format="%{file}" "DejaVu Sans:bold" 2>/dev/null || true)
          if [ -z "$FONT" ] || [ ! -f "$FONT" ]; then
            FONT=$(find /usr/share/fonts -name "*.ttf" | head -1)
          fi
          echo "Font selected: $FONT"

          # App icon — 1024x1024 green square with white "M"
          convert -size 1024x1024 xc:'#1e7a4c' \
            -fill '#ffffff' -font "$FONT" \
            -pointsize 420 -gravity center -annotate 0 'M' \
            assets/icon-only.png

          # Splash screen — 2732x2732 green background
          convert -size 2732x2732 xc:'#1e7a4c' \
            -fill '#ffffff' -font "$FONT" \
            -pointsize 200 -gravity center -annotate 0 'Mghagha Store' \
            assets/splash.png

          echo "--- Generated assets ---"
          ls -lh assets/

      - name: Generate all Android icon/splash sizes
        working-directory: mobile-app
        run: |
          ./node_modules/.bin/capacitor-assets generate \
            --iconBackgroundColor '#1e7a4c' \
            --splashBackgroundColor '#1e7a4c'

      # ── 7. Capacitor Android platform ─────────────────────────────────────────
      - name: Add Android platform
        working-directory: mobile-app
        run: |
          if [ -d "android" ]; then
            echo "android/ already exists — skipping cap add."
          else
            ./node_modules/.bin/cap add android
          fi

      - name: Sync Capacitor to Android
        working-directory: mobile-app
        run: ./node_modules/.bin/cap sync android

      # ── 8. Signing secrets ────────────────────────────────────────────────────
      - name: Check signing secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
            echo "⚠️  KEYSTORE_BASE64 not set — building debug APK as fallback."
          else
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
            echo "✅ Keystore secret found."
          fi

      - name: Decode keystore
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mghagha-release.jks

      # ── 9. Patch build.gradle (version + signing) ─────────────────────────────
      - name: Patch build.gradle
        working-directory: mobile-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: node inject-signing.js

      # ── 10. Gradle build ──────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build signed RELEASE APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build DEBUG APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Zipalign + apksigner ──────────────────────────────────────────────
      - name: Zipalign and verify APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign 2>/dev/null | sort | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner 2>/dev/null | sort | tail -1)
          UNSIGNED=$(find app/build/outputs/apk/release -name "*unsigned*.apk" 2>/dev/null | head -1)
          OUT_NAME="mghagha-v${{ env.VERSION_NAME }}-signed.apk"
          OUT_DIR="app/build/outputs/apk/release"

          echo "zipalign  : $ZIPALIGN"
          echo "apksigner : $APKSIGNER"
          echo "unsigned  : $UNSIGNED"

          if [ -n "$UNSIGNED" ] && [ -n "$ZIPALIGN" ] && [ -n "$APKSIGNER" ]; then
            "$ZIPALIGN" -v 4 "$UNSIGNED" "$OUT_DIR/aligned.apk"
            "$APKSIGNER" sign \
              --ks ../mghagha-release.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out "$OUT_DIR/$OUT_NAME" \
              "$OUT_DIR/aligned.apk"
            "$APKSIGNER" verify "$OUT_DIR/$OUT_NAME"
            echo "✅ Signed APK verified: $OUT_NAME"
          else
            # Gradle signingConfig already signed it — just rename
            SRC=$(find "$OUT_DIR" -name "app-release.apk" 2>/dev/null | head -1)
            [ -n "$SRC" ] && cp "$SRC" "$OUT_DIR/$OUT_NAME"
            echo "Gradle-signed APK renamed to $OUT_NAME"
          fi

      # ── 12. Upload ────────────────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.SIGNING_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-SIGNED
          path: mobile-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload debug APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-v${{ env.VERSION_NAME }}-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 13. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## متجر مغاغة — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| versionName | 1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ${{ env.SIGNING_AVAILABLE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://mghagha-projectzip--josenberlo.replit.app |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            echo "✅ **Signed release APK** ready — no Play Protect warnings." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug APK** — add the 4 signing secrets and push again." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
