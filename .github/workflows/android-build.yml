name: Build Signed Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mobile-app dependencies
        working-directory: mobile-app
        run: npm install

      # ── Icon & Splash ──────────────────────────────────────────────────────
      - name: Generate icon and splash assets
        working-directory: mobile-app
        run: |
          mkdir -p assets

          convert -size 1024x1024 xc:'#1e7a4c' \
            -fill '#ffffff' \
            -font /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf \
            -pointsize 420 -gravity center -annotate 0 'M' \
            assets/icon-only.png

          convert -size 2732x2732 xc:'#1e7a4c' \
            -fill '#ffffff' \
            -font /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf \
            -pointsize 220 -gravity center -annotate 0 'Mghagha Store' \
            assets/splash.png

          echo "Assets generated:" && ls -lh assets/

      - name: Generate Capacitor icon and splash resources
        working-directory: mobile-app
        run: npx @capacitor/assets generate --iconBackgroundColor '#1e7a4c' --splashBackgroundColor '#1e7a4c'

      # ── Android Platform ──────────────────────────────────────────────────
      - name: Add Android platform
        working-directory: mobile-app
        run: npx cap add android || echo "Android platform already exists — skipping."

      - name: Sync Capacitor with Android
        working-directory: mobile-app
        run: npx cap sync android

      # ── Signing Setup ─────────────────────────────────────────────────────
      - name: Decode keystore from secret
        working-directory: mobile-app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  KEYSTORE_BASE64 secret not set yet."
            echo "    Run the 'Generate Release Keystore' workflow first,"
            echo "    then add the 4 secrets to this repo."
            echo "    Falling back to a DEBUG build for now."
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "$KEYSTORE_BASE64" | base64 -d > mghagha-release.jks
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
            echo "✅ Keystore decoded successfully."
          fi

      - name: Inject signing config into build.gradle
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: node inject-signing.js

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build signed RELEASE APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build DEBUG APK (fallback — no secrets yet)
        if: env.SIGNING_AVAILABLE == 'false'
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Align & Verify ────────────────────────────────────────────────────
      - name: Zipalign the release APK
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: mobile-app/android
        run: |
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=app/build/outputs/apk/release/app-release-aligned.apk
          SIGNED=app/build/outputs/apk/release/app-release-signed.apk

          # zipalign is part of the Android SDK bundled with the runner
          ZIPALIGN=$(find $ANDROID_HOME -name zipalign | head -1)
          APKSIGNER=$(find $ANDROID_HOME -name apksigner | head -1)

          if [ -f "$UNSIGNED" ]; then
            $ZIPALIGN -v 4 "$UNSIGNED" "$ALIGNED"
            $APKSIGNER sign \
              --ks ../mghagha-release.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out "$SIGNED" \
              "$ALIGNED"
            echo "APK_PATH=$SIGNED" >> $GITHUB_ENV
            echo "✅ APK signed and zipaligned."
          else
            # Gradle signing config already signed it
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            echo "APK_PATH=$APK" >> $GITHUB_ENV
          fi

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.SIGNING_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-SIGNED-release-apk
          path: mobile-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload debug APK (fallback)
        if: env.SIGNING_AVAILABLE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mghagha-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            echo "✅ **SIGNED release APK** — no Play Protect warnings, safe to share" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug APK** — secrets not configured yet. Run the keystore workflow first." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App:** متجر مغاغة" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** https://mghagha-projectzip--josenberlo.replit.app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
